<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CSS Display</title>
        <style>
            div {
                width: 50px;
                height: 50px;
            }
            .divA {
                background-color: aliceblue;
                border: 1px solid blue;
            }
            .divB {
                background-color: darkseagreen;
                border: 1px solid green;
                width: auto;
                padding: 10px;
                margin: 10px;
            }
            .inline {
                display: inline;
            }
            .inline-block {
                display: inline-block;
            }
            .flex {
                display: flex;
                justify-content: space-around;
            }
            .inline-flex {
                display: inline-flex;
                justify-content: end;
                width: 25%;
            }
        </style>
    </head>
    <body>
        <h1>Display = block</h1>
        <div class="divA"></div>
        <div class="divA"></div>
        <div class="divA"></div>

        <h1>Display = inline</h1>
        <div class="divA inline"></div>
        <div class="divA inline"></div>
        <div class="divA inline"></div>

        <h1>Display = inline-block</h1>
        <div class="divA inline-block"></div>
        <div class="divA inline-block"></div>
        <div class="divA inline-block"></div>

        <h1>Display = flex with space-around</h1>
        <div class="divB flex">
            <div class="divA"></div>
            <div class="divA"></div>
            <div class="divA"></div>
        </div>
        <div class="divB flex">
            <div class="divA"></div>
            <div class="divA"></div>
            <div class="divA"></div>
        </div>

        <h1>Display = flex with space-around</h1>
        <div class="divB inline-flex">
            <div class="divA"></div>
            <div class="divA"></div>
            <div class="divA"></div>
        </div>
        <div class="divB inline-flex">
            <div class="divA"></div>
            <div class="divA"></div>
            <div class="divA"></div>
        </div>

        <h1>Display = none</h1>
        <div class="divA">
            <p>1</p>
        </div>
        <div class="divA" style="display: none">
            <p>2</p>
        </div>
        <div class="divA">
            <p>3</p>
        </div>
    </body>
</html>
